site_name: agent-a11y
site_description: Go accessibility auditing toolkit for WCAG compliance testing
site_url: https://plexusone.github.io/agent-a11y/
repo_url: https://github.com/plexusone/agent-a11y
repo_name: plexusone/agent-a11y

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Guide:
      - Audit Types: guide/audit-types.md
      - Configuration: guide/configuration.md
      - LLM Integration: guide/llm-integration.md
      - Report Formats: guide/report-formats.md
  - Reference:
      - CLI: reference/cli.md
      - HTTP API: reference/api.md
      - Go Library: reference/library.md
      - MCP Server: reference/mcp.md
  - Architecture:
      - Overview: architecture/overview.md
  - Releases:
      - v0.2.0: releases/v0.2.0.md
      - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/agent-a11y
